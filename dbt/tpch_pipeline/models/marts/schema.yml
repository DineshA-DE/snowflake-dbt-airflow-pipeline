version: 2

models:
  - name: fct_orders
    description: "One row per order with aggregated metrics"
    columns:
      - name: order_key
        description: "Surrogate key generated from order_id and ship_mode"
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null
      - name: customer_id
        description: "Foreign key to customers"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue for this order after discount and tax"
        tests:
          - not_null
      - name: order_date
        description: "Date when order was placed"
        tests:
          - not_null
      - name: status_code
        description: "Current status of the order"
        tests:
          - accepted_values:
              arguments:
                values: ['O','F','P']
                                

  - name: dim_customers
    description: "One row per customer with descriptive attributes"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "Full name of the customer"
        tests:
          - not_null
      - name: nation_name
        description: "Country the customer is from"
        tests:
          - not_null
      - name: market_segment
        description: "Market segment the customer belongs to"
        tests:
          - not_null
          - accepted_values:
              values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'HOUSEHOLD', 'MACHINERY']

  - name: fct_customer_revenue
    description: "One row per customer with lifetime revenue summary"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "Full name of the customer"
        tests:
          - not_null
      - name: lifetime_revenue
        description: "Total revenue generated by this customer"
        tests:
          - not_null
      - name: total_orders
        description: "Total number of orders placed by this customer"
        tests:
          - not_null